name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  build:
    name: lint + vet + test + cover + check-adrs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make ci-local

      - name: Compute coverage percentage
        id: coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "value=$total" >> "$GITHUB_OUTPUT"

      - name: Post coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            **Coverage**: ${{ steps.coverage.outputs.value }}%

  image:
    name: build image (publish on main and tags)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          REPO: ghcr.io/${{ github.repository }}
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          tags="${REPO}:sha-${short_sha}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${REPO}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF#refs/tags/}"
            tags="${tags},${REPO}:${tag_name}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build (push only on main and tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
